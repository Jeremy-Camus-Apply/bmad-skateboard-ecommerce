# Repo-wide pre-commit hooks. Install once with:
#   uvx pre-commit install
#
# Backend hooks run only on backend Python files; frontend hooks run only on
# frontend TS/TSX/CSS files. The repo's own _bmad-output/* and docs/* are skipped.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        files: ^skate-assistant-backend/
        args: ["--fix"]
      - id: ruff-format
        files: ^skate-assistant-backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^skate-assistant-backend/app/
        args: ["--config-file=skate-assistant-backend/pyproject.toml"]
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.6

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^skate-assistant-frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
        exclude: |
          (?x)^(
              skate-assistant-frontend/pnpm-lock\.yaml|
              skate-assistant-frontend/\.next/.*
          )$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
