name: backend-ci

on:
  pull_request:
    paths:
      - "skate-assistant-backend/**"
      - "docker-compose.yml"
      - "firebase.json"
      - ".firebaserc"
      - "firestore.rules"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "skate-assistant-backend/**"
      - "docker-compose.yml"
      - "firebase.json"
      - ".firebaserc"
      - "firestore.rules"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read
  id-token: write    # for Workload Identity Federation (deploy job; deferred)
  pull-requests: read
  security-events: write   # for SARIF upload to GitHub code scanning

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: skate-assistant-backend

jobs:
  lint-typecheck-test:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict (app + tests)
        run: uv run mypy app/ tests/

      - name: Pytest unit
        run: uv run pytest tests/unit -v --maxfail=1

  container-build-and-scan:
    name: container build + Trivy scan
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: skate-assistant-backend
          push: false
          load: true
          tags: skate-assistant-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fail the build on any CRITICAL/HIGH (including unfixed). Forces team
      # to either patch, mitigate, or formally accept-with-issue.
      - name: Trivy vulnerability scan (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: skate-assistant-backend:ci-${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

      # Also publish to GitHub code scanning so unfixed CVEs surface in the UI.
      - name: Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: skate-assistant-backend:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skate-assistant-backend/trivy-results.sarif
          category: trivy-backend

