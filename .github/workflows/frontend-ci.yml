name: frontend-ci

on:
  pull_request:
    paths:
      - "skate-assistant-frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]
    paths:
      - "skate-assistant-frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: skate-assistant-frontend

jobs:
  lint-typecheck-test:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: skate-assistant-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript strict
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test:unit

      - name: Next build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # Vercel handles the actual deploy via the Vercel-GitHub integration once
  # the Vercel team is provisioned (Story 1.1 cross-team coordination).
  # CI gates merges; Vercel deploys preview branches.
